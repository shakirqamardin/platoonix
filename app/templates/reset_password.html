{% extends "base_auth.html" %}
{% block title %}Set new password – Platoonix{% endblock %}
{% block content %}
  <h1 class="text-lg font-semibold text-slate-200 mb-1">Set new password</h1>
  <p class="text-slate-400 text-sm mb-4">Choose a new password (at least 6 characters).</p>
  {% if error %}<p class="text-amber-300 text-sm mb-3 rounded-lg bg-amber-900/30 px-3 py-2">{{ error }}</p>{% endif %}
  <form method="post" action="/reset-password" class="space-y-4">
    <input type="hidden" name="token" value="{{ token or '' }}" />
    <div>
      <label for="password" class="block text-sm font-medium text-slate-400 mb-1">New password</label>
      <input id="password" name="password" type="password" required minlength="6" autocomplete="new-password"
             class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2.5 text-white placeholder-slate-500"
             placeholder="At least 6 characters" />
    </div>
    <div>
      <label for="password_confirm" class="block text-sm font-medium text-slate-400 mb-1">Confirm password</label>
      <input id="password_confirm" name="password_confirm" type="password" required minlength="6" autocomplete="new-password"
             class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2.5 text-white placeholder-slate-500"
             placeholder="Same again" />
    </div>
    <button type="submit" class="w-full rounded-lg bg-emerald-600 hover:bg-emerald-500 px-4 py-2.5 text-white font-medium btn-primary">Set password</button>
  </form>
  <p class="text-slate-500 text-sm mt-4"><a href="/login" class="text-emerald-400 hover:underline">Back to log in</a></p>
{% endblock %}

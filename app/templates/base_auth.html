<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />
    <title>{% block title %}Platoonix{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .logo-glow {
            filter: drop-shadow(0 0 12px rgba(20, 184, 166, 0.5));
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(20, 184, 166, 0.4);
        }
        
        .floating-shape {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-4">
    <!-- Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-gradient-to-br from-teal-500/5 via-transparent to-cyan-500/5"></div>
        <div class="absolute top-20 right-20 w-96 h-96 bg-teal-500/10 rounded-full blur-3xl floating-shape"></div>
        <div class="absolute bottom-20 left-20 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl floating-shape" style="animation-delay: -3s;"></div>
    </div>
    
    <!-- Auth Card -->
    <div class="relative w-full max-w-md">
        <div class="glass-card rounded-2xl p-8 shadow-2xl animate-fade-in">
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <img src="/static/logo.png" alt="Platoonix" class="h-12 logo-glow" />
            </div>
            
            <!-- Content -->
            <div>
                {% block content %}{% endblock %}
            </div>
        </div>
        
        <footer class="text-center text-sm text-slate-500 mt-10 pt-6 border-t border-slate-800">
            <div class="flex flex-wrap items-center justify-center gap-x-4 gap-y-2 mb-4 text-xs sm:text-sm">
                <a href="/terms" class="hover:text-teal-400 transition-colors">Terms</a>
                <span class="hidden sm:inline text-slate-600">•</span>
                <a href="/privacy" class="hover:text-teal-400 transition-colors">Privacy</a>
                <span class="hidden sm:inline text-slate-600">•</span>
                <a href="/pricing" class="hover:text-teal-400 transition-colors">Pricing</a>
                <span class="hidden sm:inline text-slate-600">•</span>
                <a href="/api-docs" class="hover:text-teal-400 transition-colors">API Docs</a>
                <span class="hidden sm:inline text-slate-600">•</span>
                <a href="mailto:support@platoonix.co.uk" class="hover:text-teal-400 transition-colors">Contact</a>
                <span class="hidden sm:inline text-slate-600">•</span>
                <a href="/confidentiality" class="hover:text-teal-400 transition-colors">Confidentiality &amp; NDA</a>
            </div>
            <p>© 2026 Platoonix Ltd · Company No: 17133701</p>
            <p class="mt-2">Email: support@platoonix.co.uk</p>
        </footer>
    </div>

    <div id="cookie-consent-banner" class="hidden fixed bottom-3 left-3 right-3 z-[90] rounded-xl border border-slate-700 bg-slate-900/95 text-slate-200 shadow-2xl backdrop-blur px-4 py-3">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <p class="text-xs sm:text-sm">We use cookies to improve your experience. By using this site, you agree to our use of cookies.</p>
        <div class="flex items-center gap-2 shrink-0">
          <a href="/privacy#cookies" class="text-xs sm:text-sm text-teal-400 hover:underline">Cookie Policy</a>
          <button type="button" id="cookie-consent-accept" class="min-h-[40px] px-4 py-2 rounded-lg bg-teal-600 hover:bg-teal-500 text-white text-xs sm:text-sm font-semibold">Accept</button>
        </div>
      </div>
    </div>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js").catch(function () {});
            });
        }

(function () {
  var key = 'platoonix_cookie_consent_v1';
  var banner = document.getElementById('cookie-consent-banner');
  var accept = document.getElementById('cookie-consent-accept');
  if (!banner || !accept) return;
  try {
    if (localStorage.getItem(key) === 'accepted') return;
  } catch (e) {}
  banner.classList.remove('hidden');
  accept.addEventListener('click', function () {
    try { localStorage.setItem(key, 'accepted'); } catch (e) {}
    banner.classList.add('hidden');
  });
})();
    </script>
</body>
</html>

{% extends "base_auth.html" %}
{% block title %}Forgot password – Platoonix{% endblock %}
{% block content %}
  <h1 class="text-lg font-semibold text-slate-200 mb-1">Forgot password?</h1>
  <p class="text-slate-400 text-sm mb-4">Enter your login email. We’ll show you a one-time link to set a new password.</p>
  {% if error %}<p class="text-amber-300 text-sm mb-3 rounded-lg bg-amber-900/30 px-3 py-2">{{ error }}</p>{% endif %}
  <form method="post" action="/forgot-password" class="space-y-4">
    <div>
      <label for="email" class="block text-sm font-medium text-slate-400 mb-1">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email"
             class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2.5 text-white placeholder-slate-500"
             value="{{ email or '' }}" placeholder="you@company.com" />
    </div>
    <button type="submit" class="w-full rounded-lg bg-emerald-600 hover:bg-emerald-500 px-4 py-2.5 text-white font-medium btn-primary">Send reset link</button>
  </form>
  <p class="text-slate-500 text-sm mt-4"><a href="/login" class="text-emerald-400 hover:underline">Back to log in</a></p>
{% endblock %}

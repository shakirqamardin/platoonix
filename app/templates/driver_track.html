<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking - Platoonix</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAF5-SHORQnkmOqrsvQaxToDFf36Jjk-nM&libraries=geometry"></script>
    <style>
        .card { @apply rounded-xl border border-slate-800 bg-slate-900/60; }
        #map { height: 300px; border-radius: 12px; }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="max-w-2xl mx-auto px-4 py-6">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-6">
            <img src="/static/logo.png" alt="Platoonix" class="h-9 w-auto">
            <div>
                <h1 class="text-xl font-semibold">Live Tracking</h1>
                <p class="text-sm text-slate-400">Job #{{ job.id }}</p>
            </div>
        </div>

        <!-- Map -->
        <div class="card p-4 mb-6">
            <div id="map"></div>
        </div>

        <!-- Status Card -->
        <div class="card p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Status</h2>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-slate-500" id="gps-dot"></div>
                    <span class="text-sm text-slate-400" id="gps-status">Starting...</span>
                </div>
            </div>

            <select id="status-select" class="w-full rounded-lg border border-slate-600 bg-slate-900/80 px-4 py-3 text-sm mb-4">
                <option value="en_route_to_pickup">🚚 En route to pickup</option>
                <option value="arrived_at_pickup">📍 Arrived at pickup</option>
                <option value="loaded">📦 Loaded - delivering</option>
                <option value="arrived_at_delivery">✓ Arrived at delivery</option>
                <option value="delivered">✅ Delivered</option>
            </select>

            <!-- Contact Info -->
            <div class="bg-slate-900/50 rounded-lg p-4">
                <h3 class="text-sm font-semibold mb-3 text-teal-400">Loader Contact</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between">
                        <span class="text-slate-400">Pickup:</span>
                        <span class="font-mono">{{ load.pickup_postcode }}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-400">Delivery:</span>
                        <span class="font-mono">{{ load.delivery_postcode }}</span>
                    </div>
                    {% if loader_contact %}
                    <div class="flex justify-between">
                        <span class="text-slate-400">Contact:</span>
                        <span>{{ loader_contact }}</span>
                    </div>
                    {% endif %}
                    {% if loader_phone %}
                    <div class="flex justify-between">
                        <span class="text-slate-400">Phone:</span>
                        <a href="tel:{{ loader_phone }}" class="text-teal-400 hover:underline">{{ loader_phone }}</a>
                    </div>
                    {% endif %}
                </div>
            </div>
            
            <p id="last-update" class="text-xs text-slate-500 mt-3"></p>
        </div>

        <button id="stop-tracking" class="w-full px-6 py-3 border border-red-600 text-red-400 rounded-lg hover:bg-red-900/20">
            Stop Tracking & Return
        </button>
    </div>

    <script>
        const jobId = {{ job.id }};
        let map, marker, pickupMarker, deliveryMarker;
        let watchId = null;
        let lastPosition = null;
        let currentStatus = 'en_route_to_pickup';

        const statusSelect = document.getElementById('status-select');
        const gpsDot = document.getElementById('gps-dot');
        const gpsStatus = document.getElementById('gps-status');
        const lastUpdate = document.getElementById('last-update');

        // Initialize map
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 10,
                center: { lat: 52.5, lng: -1.5 },
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#1e293b" }] },
                    { elementType: "labels.text.fill", stylers: [{ color: "#94a3b8" }] },
                    { featureType: "road", elementType: "geometry", stylers: [{ color: "#334155" }] }
                ]
            });

            // Pickup marker
            pickupMarker = new google.maps.Marker({
                map: map,
                position: { lat: 0, lng: 0 },
                label: 'P',
                title: 'Pickup: {{ load.pickup_postcode }}'
            });

            // Delivery marker
            deliveryMarker = new google.maps.Marker({
                map: map,
                position: { lat: 0, lng: 0 },
                label: 'D',
                title: 'Delivery: {{ load.delivery_postcode }}'
            });

            // Driver marker
            marker = new google.maps.Marker({
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 10,
                    fillColor: "#14b8a6",
                    fillOpacity: 1,
                    strokeColor: "#fff",
                    strokeWeight: 2
                },
                title: 'Your location'
            });

            geocodePostcodes();
        }

        // Geocode pickup/delivery
        async function geocodePostcodes() {
            const geocoder = new google.maps.Geocoder();
            
            geocoder.geocode({ address: '{{ load.pickup_postcode }}, UK' }, (results, status) => {
                if (status === 'OK') {
                    pickupMarker.setPosition(results[0].geometry.location);
                }
            });

            geocoder.geocode({ address: '{{ load.delivery_postcode }}, UK' }, (results, status) => {
                if (status === 'OK') {
                    deliveryMarker.setPosition(results[0].geometry.location);
                }
            });
        }

        statusSelect.addEventListener('change', function() {
            currentStatus = this.value;
            updateLocation();
        });

        function startTracking() {
            if (!navigator.geolocation) {
                alert('GPS not supported');
                return;
            }

            gpsDot.className = 'w-3 h-3 rounded-full bg-amber-500 animate-pulse';
            gpsStatus.textContent = 'Getting GPS...';

            watchId = navigator.geolocation.watchPosition(
                position => {
                    lastPosition = position;
                    const pos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    marker.setPosition(pos);
                    map.setCenter(pos);
                    
                    gpsDot.className = 'w-3 h-3 rounded-full bg-emerald-500';
                    gpsStatus.textContent = 'GPS Active';
                    updateLocation();
                },
                error => {
                    console.error('GPS error:', error);
                    gpsDot.className = 'w-3 h-3 rounded-full bg-red-500';
                    gpsStatus.textContent = 'GPS Error';
                },
                { enableHighAccuracy: true, maximumAge: 30000, timeout: 27000 }
            );

            setInterval(updateLocation, 60000);
        }

        async function updateLocation() {
            if (!lastPosition) return;

            try {
                const response = await fetch('/api/tracking/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_id: jobId,
                        latitude: lastPosition.coords.latitude,
                        longitude: lastPosition.coords.longitude,
                        status: currentStatus
                    })
                });

                if (response.ok) {
                    lastUpdate.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
                }
            } catch (error) {
                console.error('Update failed:', error);
            }
        }

        document.getElementById('stop-tracking').addEventListener('click', function() {
            if (confirm('Stop tracking and return to dashboard?')) {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                window.location.href = '/driver';
            }
        });

        initMap();
        startTracking();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />
    <title>{% block title %}Platoonix{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .logo-glow {
            filter: drop-shadow(0 0 12px rgba(20, 184, 166, 0.5));
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(20, 184, 166, 0.4);
        }
        
        .floating-shape {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-4">
    <!-- Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-gradient-to-br from-teal-500/5 via-transparent to-cyan-500/5"></div>
        <div class="absolute top-20 right-20 w-96 h-96 bg-teal-500/10 rounded-full blur-3xl floating-shape"></div>
        <div class="absolute bottom-20 left-20 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl floating-shape" style="animation-delay: -3s;"></div>
    </div>
    
    <!-- Auth Card -->
    <div class="relative w-full max-w-md">
        <div class="glass-card rounded-2xl p-8 shadow-2xl animate-fade-in">
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <img src="/static/logo.png" alt="Platoonix" class="h-12 logo-glow" />
            </div>
            
            <!-- Content -->
            <div>
                {% block content %}{% endblock %}
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center mt-8 text-slate-500 text-sm">
            <p>© 2026 Platoonix. Smart Haulage Marketplace.</p>
        </div>
    </div>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js").catch(function () {});
            });
        }
    </script>
</body>
</html>
